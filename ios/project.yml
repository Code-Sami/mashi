name: MashiIOS
options:
  bundleIdPrefix: com.mashi
  xcodeVersion: "15.0"
  deploymentTarget:
    iOS: "17.0"
targets:
  MashiIOS:
    type: application
    platform: iOS
    sources:
      - MashiApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.mashi.ios
        SWIFT_VERSION: 5.10
        INFOPLIST_KEY_CFBundleDisplayName: Mashi
        INFOPLIST_KEY_CFBundleShortVersionString: "$(MARKETING_VERSION)"
        INFOPLIST_KEY_CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
      configs:
        Release:
          # Replace with your live site origin (same deployment as the Next.js app on Vercel).
          INFOPLIST_KEY_API_BASE_URL: "https://mashimarkets.com"
